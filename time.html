<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Vektorkalibrierung und Terminalzugriff für temporale Sprünge der Superfast Jellyfish Flotte."
    />
    <title>Superfast Jellyfish - Chrono Vector Calibration</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="logo">SUPERFAST JELLYFISH</div>
      <nav class="nav-bar">
        <a href="index.html#home">Home</a>
        <a href="science.html">Science</a>
        <a href="qualle.html">Spaceship</a>
        <a href="ages.html">Ages</a>
      </nav>
    </header>

    <main class="content-section" style="max-width: 800px; margin: 0 auto">
      <h1 class="section-title">CHRONO-VEKTOR INITIALISIERUNG</h1>

      <form
        class="calibration-form"
        onsubmit="
          event.preventDefault();
          alert('Vektor erfolgreich kalibriert.');
        "
      >
        <fieldset style="border: none">
          <legend>1. Ziel-Koordinaten-Bestimmung</legend>
          <div class="input-group">
            <label for="target-epoch">Epoche / Temporal-Vektor</label>
            <input
              type="text"
              id="target-epoch"
              placeholder="z.B. JERUSALEM_33_AD"
              required
            />
          </div>
        </fieldset>

        <fieldset style="border: none; margin-top: 30px">
          <legend>2. Biologische Vital-Einstellung</legend>
          <div class="input-group">
            <label for="puls-frequency">Pulsations-Frequenz des Schirms</label>
            <select id="puls-frequency">
              <option value="04">0.4 Hz (Standard Temporal-Gleiten)</option>
              <option value="08">0.8 Hz (Beschleunigter Hyper-Sog)</option>
              <option value="01">0.1 Hz (Tiefschlaf-Verankerung)</option>
            </select>
          </div>

          <div class="input-group">
            <label>Kybernetische Sub-Prozessoren</label>
            <div class="checkbox-grid">
              <label class="checkbox-label"
                ><input type="checkbox" checked /> Hydrogel-Stabilisator
                aktivieren</label
              >
              <label class="checkbox-label"
                ><input type="checkbox" checked /> Paradoxon-Filter
                (Sekret-Pumpe)</label
              >
              <label class="checkbox-label"
                ><input type="checkbox" /> Kalzium-Suspensions-Dämpfer
                aussetzen</label
              >
            </div>
          </div>
        </fieldset>

        <button type="submit" class="launch-btn">
          Kontraktionsschlag auslösen (Sprung inititieren)
        </button>
      </form>
    </main>

    <footer class="main-footer">
      <p>
        System-Status: Bereit für Sprungsequenz | Verschlüsselung:
        QUANTUM-BIO-LOCK
      </p>
    </footer>
  </body>
</html>
