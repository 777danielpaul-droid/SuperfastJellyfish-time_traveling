<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Vektorkalibrierung und Terminalzugriff für temporale Sprünge der Superfast Jellyfish Flotte."
    />
    <title>Superfast Jellyfish - Chrono Vector Calibration</title>
    <style>
      :root {
        --neon-cyan: #00f3ff;
        --neon-pink: #ff0055;
        --neon-green: #39ff14;
        --dark-void: #05050a;
        --panel-bg: rgba(10, 10, 20, 0.85);
        --text-light: #e2e8f0;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--dark-void);
        background-image:
          linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
        background-size: 25px 25px;
        color: var(--text-light);
        font-family: "Courier New", monospace;
        line-height: 1.5;
        overflow-x: hidden;
      }

      .main-header {
        background-color: rgba(5, 5, 10, 0.9);
        backdrop-filter: blur(8px);
        border-bottom: 2px solid var(--neon-pink);
        box-shadow: 0 0 15px rgba(255, 0, 85, 0.2);
        padding: 25px 5%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
      }

      .logo {
        color: #fff;
        text-shadow: 0 0 10px var(--neon-pink);
        font-size: 2rem;
        font-weight: bold;
        letter-spacing: 4px;
        text-align: center;
      }

      .nav-bar a {
        color: #a0aec0;
        text-decoration: none;
        margin: 0 15px;
        text-transform: uppercase;
        font-size: 0.9rem;
        letter-spacing: 1px;
        transition: color 0.3s;
      }

      .nav-bar a:hover {
        color: var(--neon-cyan);
        text-shadow: 0 0 5px var(--neon-cyan);
      }

      .hud-container {
        max-width: 800px;
        margin: 50px auto;
        padding: 0 20px;
      }

      .chrono-panel {
        background: var(--panel-bg);
        border: 2px solid var(--neon-cyan);
        box-shadow: 0 0 25px rgba(0, 243, 255, 0.15);
        padding: 40px 30px;
        position: relative;
      }

      .chrono-panel::after {
        content: "● CONSOLE ACTIVE";
        position: absolute;
        top: 15px;
        right: 20px;
        color: var(--neon-green);
        font-size: 0.75rem;
        animation: blink 2s infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .panel-title {
        font-size: 1.6rem;
        color: #fff;
        text-shadow: 0 0 8px var(--neon-cyan);
        margin-bottom: 30px;
        text-transform: uppercase;
        border-bottom: 1px dashed rgba(0, 243, 255, 0.3);
        padding-bottom: 10px;
      }

      fieldset {
        border: 1px solid rgba(255, 0, 85, 0.4);
        padding: 25px;
        margin-bottom: 25px;
        background: rgba(255, 0, 85, 0.02);
      }

      legend {
        color: var(--neon-pink);
        padding: 0 10px;
        font-weight: bold;
        text-transform: uppercase;
        font-size: 0.95rem;
      }
      .input-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 20px;
      }
      label {
        font-size: 0.85rem;
        color: var(--neon-cyan);
        text-transform: uppercase;
      }

      input[type="text"],
      select {
        width: 100%;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid var(--neon-cyan);
        padding: 12px;
        color: #fff;
        font-family: inherit;
        font-size: 1rem;
      }

      input[type="text"]:focus,
      select:focus {
        outline: none;
        border-color: var(--neon-pink);
        box-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
      }

      .checkbox-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-top: 10px;
      }
      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text-light);
        cursor: pointer;
        font-size: 0.9rem;
      }

      .launch-btn {
        width: 100%;
        background: transparent;
        color: var(--neon-green);
        border: 2px solid var(--neon-green);
        padding: 18px;
        font-family: inherit;
        font-size: 1.2rem;
        font-weight: bold;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.4s ease;
        box-shadow: inset 0 0 10px rgba(57, 255, 20, 0.1);
        margin-top: 10px;
      }

      .launch-btn:hover {
        background: var(--neon-green);
        color: var(--dark-void);
        box-shadow: 0 0 25px var(--neon-green);
      }
      .main-footer {
        text-align: center;
        padding: 40px 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        font-size: 0.8rem;
        color: #4a5568;
        margin-top: 60px;
      }

      @media (max-width: 600px) {
        .hud-container {
          margin: 20px auto;
        }
        .chrono-panel {
          padding: 25px 15px;
        }
        fieldset {
          padding: 15px;
        }
      }
    </style>
  </head>
  <body>
    <header class="main-header">
      <div class="logo" role="banner">SFJ NAV-TERMINAL</div>
      <nav class="nav-bar" aria-label="HUD Navigation">
        <a href="index.html#home">Home</a>
        <a href="science.html">Science</a>
        <a href="qualle.html">Spaceship</a>
        <a href="index.html#ages">Ages</a>
      </nav>
    </header>

    <main class="hud-container">
      <form
        class="chrono-panel"
        action="#initiate"
        method="POST"
        aria-label="Temporale Steuerung"
      >
        <h1 class="panel-title">Chrono-Vektor-Eingabe</h1>

        <fieldset>
          <legend>1. Zielkoordinaten</legend>
          <div class="input-group">
            <label for="vector-select">Vektor-Resonanzwelle wählen</label>
            <select id="vector-select" required>
              <option value="">-- Bitte Vektor wählen --</option>
              <option value="jerusalem">
                Vektor 01: Jerusalem (33 n. Chr.)
              </option>
              <option value="oronth">
                Vektor 02: Oronth-Ereignis (v. Chr.)
              </option>
              <option value="elaria">
                Vektor 03: Elaria-Zivilisation (v. Chr.)
              </option>
              <option value="theron">
                Vektor 04: Theron-Refugium (v. Chr.)
              </option>
              <option value="boreas">
                Vektor 05: Boreas-Konflikt (v. Chr.)
              </option>
              <option value="sol">
                Vektor 06: Sol-Invictus-Kult (v. Chr.)
              </option>
              <option value="kadesh">
                Vektor 07: Kadesh-Abkommen (v. Chr.)
              </option>
              <option value="custom">
                Manueller Tiefen-Sprung (Anomalie-Gefahr)
              </option>
            </select>
          </div>

          <div class="input-group">
            <label for="temporal-depth"
              >Manuelle Epochen-Kennung (optional)</label
            >
            <input
              type="text"
              id="temporal-depth"
              placeholder="z.B. STROM-ALPHA-33"
              aria-describedby="depth-hint"
            />
            <span
              id="depth-hint"
              style="font-size: 0.7rem; color: #4a5568; margin-top: 4px"
              >Nur nötig bei unkartierten Resonanzen.</span
            >
          </div>
        </fieldset>

        <fieldset>
          <legend>2. Biologische Vital-Einstellung</legend>
          <div class="input-group">
            <label for="puls-frequency">Pulsations-Frequenz des Schirms</label>
            <select id="puls-frequency">
              <option value="04">0.4 Hz (Standard Temporal-Gleiten)</option>
              <option value="08">0.8 Hz (Beschleunigter Hyper-Sog)</option>
              <option value="01">0.1 Hz (Tiefschlaf-Verankerung)</option>
            </select>
          </div>

          <div class="input-group">
            <label>Kybernetische Sub-Prozessoren</label>
            <div class="checkbox-grid">
              <label class="checkbox-label"
                ><input type="checkbox" checked /> Hydrogel-Stabilisator
                aktivieren</label
              >
              <label class="checkbox-label"
                ><input type="checkbox" checked /> Paradoxon-Filter
                (Sekret-Pumpe)</label
              >
              <label class="checkbox-label"
                ><input type="checkbox" /> Kalzium-Suspensions-Dämpfer
                aussetzen</label
              >
            </div>
          </div>
        </fieldset>

        <button type="submit" class="launch-btn">
          Kontraktionsschlag auslösen (Sprung inititieren)
        </button>
      </form>
    </main>

    <footer class="main-footer">
      <p>
        System-Status: Bereit für Sprungsequenz | Verschlüsselung:
        QUANTUM-BIO-SECURE
      </p>
    </footer>
  </body>
</html>
